name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm playground:test
      - run: pnpm build
      - run: pnpm playground:build
      - run: pnpm exec tsx scripts/smoke-browser-playground.ts
      - run: pnpm exec playwright install --only-shell chromium
      - run: pnpm playground:e2e
