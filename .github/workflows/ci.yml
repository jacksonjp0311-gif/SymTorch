name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: pw-chromium-${{ runner.os }}-v1178
          restore-keys: |
            pw-chromium-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm playground:test
      - run: pnpm build
      - run: pnpm playground:build
      - run: pnpm exec tsx scripts/smoke-browser-playground.ts

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --only-shell chromium

      - name: Playwright E2E
        run: pnpm playground:e2e
